<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">FederSat distributed beamforming system model</title>
  <desc id="desc">Schematic of multiple LEO satellites using federated learning and codebook based distributed beamforming to serve a terrestrial user.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f7fbf1"/>
    </linearGradient>
    <style>
      .bg { fill: url(#sky); }
      .earth { fill: #d9eadf; stroke: #4f8a6b; stroke-width: 3; }
      .orbit { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 9 8; }
      .satBody { fill: #2563eb; stroke: #1e3a8a; stroke-width: 2; }
      .satWing { fill: #93c5fd; stroke: #1e40af; stroke-width: 1.5; }
      .user { fill: #f59e0b; stroke: #92400e; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.7; rx: 8; }
      .link { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .model { stroke: #7c3aed; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .signal { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 23px; fill: #111827; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 17px; fill: #334155; }
      .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="620"/>
  <text class="label" x="58" y="58">FederSat distributed beamforming for LEO satellite communications</text>
  <text class="small" x="58" y="88">Multi-satellite cooperation, local FL model update, codebook selection, and coherent reception</text>

  <ellipse class="orbit" cx="358" cy="340" rx="285" ry="178"/>
  <circle class="earth" cx="358" cy="445" r="98"/>
  <path d="M280 425 C322 397,386 397,438 431" fill="none" stroke="#6b8f7a" stroke-width="2"/>

  <g transform="translate(160 238)">
    <rect class="satWing" x="-38" y="-9" width="28" height="18" rx="3"/>
    <rect class="satBody" x="-10" y="-14" width="34" height="28" rx="5"/>
    <rect class="satWing" x="24" y="-9" width="28" height="18" rx="3"/>
    <text class="tiny" x="-28" y="42">LEO 1</text>
  </g>
  <g transform="translate(360 175)">
    <rect class="satWing" x="-38" y="-9" width="28" height="18" rx="3"/>
    <rect class="satBody" x="-10" y="-14" width="34" height="28" rx="5"/>
    <rect class="satWing" x="24" y="-9" width="28" height="18" rx="3"/>
    <text class="tiny" x="-28" y="42">LEO n</text>
  </g>
  <g transform="translate(560 250)">
    <rect class="satWing" x="-38" y="-9" width="28" height="18" rx="3"/>
    <rect class="satBody" x="-10" y="-14" width="34" height="28" rx="5"/>
    <rect class="satWing" x="24" y="-9" width="28" height="18" rx="3"/>
    <text class="tiny" x="-28" y="42">LEO N</text>
  </g>

  <circle class="user" cx="358" cy="386" r="18"/>
  <text class="tiny" x="315" y="421">terrestrial user</text>
  <path class="link" d="M160 260 C210 300,280 345,342 378"/>
  <path class="link" d="M360 198 C358 250,358 316,358 366"/>
  <path class="link" d="M560 272 C510 312,438 355,374 379"/>
  <path class="signal" d="M206 248 C310 295,414 300,516 260"/>
  <text class="tiny" x="226" y="316">coherent signal combining</text>
  <text class="tiny" x="408" y="224">inter-satellite model sharing</text>

  <rect class="panel" x="690" y="125" width="320" height="82"/>
  <text class="small" x="715" y="157">1. Local satellite observations</text>
  <text class="tiny" x="715" y="184">orbit state, imperfect CSI, received samples</text>

  <rect class="panel" x="690" y="245" width="320" height="82"/>
  <text class="small" x="715" y="277">2. Federated model update</text>
  <text class="tiny" x="715" y="304">each satellite trains locally and shares weights</text>

  <rect class="panel" x="690" y="365" width="320" height="82"/>
  <text class="small" x="715" y="397">3. Codebook beam selection</text>
  <text class="tiny" x="715" y="424">predicted precoding for the next time slots</text>

  <rect class="panel" x="690" y="485" width="320" height="58"/>
  <text class="small" x="715" y="520">4. Achievable rate evaluation</text>

  <path class="model" d="M850 207 L850 242"/>
  <path class="model" d="M850 327 L850 362"/>
  <path class="model" d="M850 447 L850 482"/>
  <path class="model" d="M624 255 C660 252,668 170,688 166"/>
  <path class="model" d="M623 264 C654 282,662 286,688 286"/>
  <path class="model" d="M624 274 C660 328,668 402,688 406"/>
</svg>
